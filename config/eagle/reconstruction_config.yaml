---
map:
  voxels_per_side: 16
  voxel_size: 0.4
  truncation_distance: 0.3
  with_pointcloud: true
  pointcloud_voxel_size: 0.05
  pointcloud_voxels_per_side: 16

dense_representation_radius_m: 100.0
mesh:
  min_weight: 0.000001
  integrator_threads: -1
tsdf:
  verbosity: 1
  num_threads: -1
  interpolation_method: nearest
  use_weight_dropoff: false
  semantic_integrator:
    type: MLESemanticIntegrator
